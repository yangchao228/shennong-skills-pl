<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #070A12; --surface: #0D1220; --surface2: #111827; --surface3: #161F30;
  --border: #1A2333; --border2: #243044;
  --primary: #38BDF8; --primary-dim: rgba(56,189,248,0.1);
  --text: #CBD5E1; --heading: #F1F5F9; --muted: #4B5E78;
  --green: #34D399; --green-dim: rgba(52,211,153,0.1);
  --amber: #FBBF24; --amber-dim: rgba(251,191,36,0.1);
  --red: #F87171; --red-dim: rgba(248,113,113,0.1);
  --indigo: #818CF8; --indigo-dim: rgba(129,140,248,0.1);
  --orange: #FB923C; --orange-dim: rgba(251,146,60,0.1);
  --font: 'Syne', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --r: 8px; --t: 160ms ease;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

/* ── Layout ── */
.layout { display: grid; grid-template-rows: 52px 1fr; height: 100vh; }
.topbar { display: flex; align-items: center; gap: 14px; padding: 0 20px;
  border-bottom: 1px solid var(--border); background: var(--surface); }
.logo { font-size: 15px; font-weight: 700; color: var(--heading); letter-spacing: .05em; }
.logo span { color: var(--primary); }
.path-badge { font-family: var(--mono); font-size: 11px; color: var(--muted);
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; }
.spacer { flex: 1; }
.top-stat { font-size: 12px; color: var(--muted); }
.top-stat b { color: var(--primary); }

.main { display: grid; grid-template-columns: 272px 1fr; overflow: hidden; }

/* ── Sidebar ── */
.sidebar { border-right: 1px solid var(--border); overflow-y: auto; background: var(--surface); }
.sidebar-hdr { padding: 14px 16px 8px; font-size: 10px; font-weight: 600;
  letter-spacing: .12em; color: var(--muted); text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between; }
.search { margin: 0 12px 10px; background: var(--bg); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 7px 10px; color: var(--text); font-family: var(--font);
  font-size: 13px; width: calc(100% - 24px); outline: none; transition: border-color var(--t); }
.search:focus { border-color: var(--primary); }
.search::placeholder { color: var(--muted); }

.skill-item { padding: 9px 14px; cursor: pointer; border-left: 2px solid transparent;
  transition: background var(--t), border-color var(--t); }
.skill-item:hover { background: var(--surface2); }
.skill-item.active { background: var(--primary-dim); border-left-color: var(--primary); }
.si-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.si-name { font-size: 13px; font-weight: 600; color: var(--heading); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.si-bot { display: flex; align-items: center; gap: 5px; }
.si-date { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-left: auto; }
.test-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

/* ── Badges ── */
.badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; letter-spacing: .04em; }
.badge-grade-A { background: var(--green-dim); color: var(--green); }
.badge-grade-B { background: var(--primary-dim); color: var(--primary); }
.badge-grade-C { background: var(--amber-dim); color: var(--amber); }
.badge-grade-D,.badge-grade-F { background: var(--red-dim); color: var(--red); }
.badge-verifiable { background: var(--indigo-dim); color: var(--indigo); }
.badge-anchor { background: var(--green-dim); color: var(--green); }
.badge-judgment { background: var(--orange-dim); color: var(--orange); }
.badge-unknown { background: rgba(75,94,120,.15); color: var(--muted); }

/* ── Detail ── */
.detail { overflow-y: auto; }
.empty-state { height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px; color: var(--muted); }
.empty-icon { font-size: 36px; opacity: .25; }

/* ── Tabs ── */
.tabs-bar { display: flex; gap: 2px; padding: 16px 28px 0;
  border-bottom: 1px solid var(--border); background: var(--surface); }
.tab { padding: 8px 16px; font-size: 13px; font-weight: 600; color: var(--muted);
  border-bottom: 2px solid transparent; cursor: pointer; transition: color var(--t), border-color var(--t);
  margin-bottom: -1px; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

.tab-content { display: none; padding: 24px 28px; }
.tab-content.active { display: block; }

/* ── Detail header ── */
.detail-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 22px; }
.detail-title-block { flex: 1; }
.detail-name { font-size: 21px; font-weight: 700; color: var(--heading); margin-bottom: 6px; }
.detail-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.detail-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }

/* Score ring */
.ring { width: 70px; height: 70px; flex-shrink: 0; position: relative; }
.ring svg { width: 70px; height: 70px; transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--border2); stroke-width: 5; }
.ring-fill { fill: none; stroke-width: 5; stroke-linecap: round;
  transition: stroke-dashoffset .6s cubic-bezier(.4,0,.2,1); }
.ring-text { position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; font-family: var(--mono); }
.ring-num { font-size: 17px; line-height: 1; color: var(--heading); }
.ring-lbl { font-size: 9px; color: var(--muted); letter-spacing: .06em; margin-top: 1px; }

/* ── Section ── */
.section { margin-bottom: 22px; }
.section-title { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Issues */
.issues { display: flex; flex-direction: column; gap: 5px; }
.issue { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px;
  border-radius: var(--r); border: 1px solid var(--border); }
.issue.error { background: var(--red-dim); border-color: rgba(248,113,113,.2); }
.issue.warning { background: var(--amber-dim); border-color: rgba(251,191,36,.2); }
.issue.info { background: var(--primary-dim); border-color: rgba(56,189,248,.2); }
.issue.blocking { background: var(--red-dim); border-color: rgba(248,113,113,.2); }
.issue.risk { background: var(--amber-dim); border-color: rgba(251,191,36,.2); }
.issue.optimization { background: var(--primary-dim); border-color: rgba(56,189,248,.2); }
.issue-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.issue.error .issue-dot { background: var(--red); }
.issue.warning .issue-dot { background: var(--amber); }
.issue.info .issue-dot { background: var(--primary); }
.issue.blocking .issue-dot { background: var(--red); }
.issue.risk .issue-dot { background: var(--amber); }
.issue.optimization .issue-dot { background: var(--primary); }
.issue-msg { font-size: 13px; }
.issue-dim { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.no-issues { padding: 10px; color: var(--green); font-size: 13px; display: flex; gap: 6px; align-items: center; }
.health-summary { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.health-chip { font-size:11px; font-weight:600; padding:4px 8px; border-radius:999px; }
.health-chip.blocking { background: var(--red-dim); color: var(--red); }
.health-chip.risk { background: var(--amber-dim); color: var(--amber); }
.health-chip.optimization { background: var(--primary-dim); color: var(--primary); }
.health-explain { font-size:12px; color: var(--muted); line-height:1.6; margin-bottom: 10px; }
.baseline-strip { display:flex; gap:10px; flex-wrap:wrap; margin: 4px 0 16px; }
.baseline-card { padding:10px 12px; border-radius: var(--r); border:1px solid var(--border2); background: var(--surface2); min-width: 160px; }
.baseline-label { font-size:10px; letter-spacing:.08em; text-transform: uppercase; color: var(--muted); margin-bottom:4px; }
.baseline-value { font-size:13px; color: var(--text); font-family: var(--mono); }
.summary-grid { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
.summary-card { border:1px solid var(--border2); border-radius: var(--r); background: var(--surface2); padding: 12px; }
.summary-card-title { font-size:11px; letter-spacing:.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.summary-card-body { font-size:13px; color: var(--text); line-height: 1.7; }
.summary-card-body ul { list-style:none; display:flex; flex-direction:column; gap:6px; }
.summary-card-body li { display:flex; gap:6px; }
.summary-card-body li::before { content:'•'; color: var(--primary); }
.history-toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom: 12px; }
.select { background: var(--bg); border:1px solid var(--border2); color: var(--text); border-radius: 4px; padding: 6px 8px; font-family: var(--mono); font-size: 12px; }
.pager { display:flex; gap:8px; align-items:center; justify-content:flex-end; margin-top: 12px; }
.version-list { display:flex; flex-direction:column; gap:8px; }
.version-item { border:1px solid var(--border2); background: var(--surface2); border-radius: var(--r); padding: 10px 12px; }
.version-top { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom: 6px; }
.version-id { font-family: var(--mono); font-size:12px; color: var(--heading); }
.version-meta { font-size:11px; color: var(--muted); }
.version-source { font-size:10px; font-weight:600; padding:2px 6px; border-radius:999px; background: var(--primary-dim); color: var(--primary); }
.version-source.baseline { background: var(--green-dim); color: var(--green); }
.version-source.pre-restore { background: var(--amber-dim); color: var(--amber); }
.version-source.other { background: rgba(75,94,120,.15); color: var(--muted); }
.version-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top: 8px; }
.diff-toolbar { display:flex; gap:8px; align-items:center; justify-content:space-between; flex-wrap:wrap; margin-bottom: 12px; }
.diff-summary { font-size:12px; color: var(--muted); }
.diff-list { display:flex; flex-direction:column; gap:10px; }
.diff-block { border:1px solid var(--border2); border-radius: var(--r); overflow:hidden; background: var(--surface2); }
.diff-header { display:flex; justify-content:space-between; gap:8px; align-items:center; padding: 10px 12px; cursor:pointer; }
.diff-header.added { background: rgba(52,211,153,.08); }
.diff-header.deleted { background: rgba(248,113,113,.08); }
.diff-header.modified { background: rgba(251,191,36,.08); }
.diff-header-left { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.diff-kind { font-size:10px; padding:2px 6px; border-radius:999px; font-weight:600; }
.diff-kind.added { background: var(--green-dim); color: var(--green); }
.diff-kind.deleted { background: var(--red-dim); color: var(--red); }
.diff-kind.modified { background: var(--amber-dim); color: var(--amber); }
.diff-body { display:none; padding: 10px 12px; border-top: 1px solid var(--border); }
.diff-block.open .diff-body { display:block; }
.diff-col-wrap { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.diff-col-title { font-size:10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.diff-pre { background: var(--bg); border:1px solid var(--border); border-radius: 4px; padding: 8px; font-family: var(--mono); font-size:12px; line-height:1.6; white-space:pre-wrap; word-break:break-word; color: var(--text); min-height: 60px; }
@media (max-width: 900px) {
  .summary-grid, .diff-col-wrap { grid-template-columns: 1fr; }
}

/* Type cards */
.type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.type-card { padding: 12px; border-radius: var(--r); border: 2px solid var(--border);
  cursor: pointer; transition: all var(--t); text-align: center; }
.type-card:hover { border-color: var(--border2); background: var(--surface2); }
.type-card.sel-verifiable { border-color: var(--indigo); background: var(--indigo-dim); }
.type-card.sel-anchor { border-color: var(--green); background: var(--green-dim); }
.type-card.sel-judgment { border-color: var(--orange); background: var(--orange-dim); }
.type-icon { font-size: 18px; margin-bottom: 5px; }
.type-name { font-size: 12px; font-weight: 600; color: var(--heading); }
.type-desc { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }

/* AI panel */
.ai-panel { border: 1px solid var(--border2); border-radius: var(--r); overflow: hidden; }
.ai-panel-hdr { padding: 10px 14px; background: var(--surface2);
  display: flex; align-items: center; justify-content: space-between; }
.ai-panel-title { font-size: 13px; font-weight: 600; color: var(--heading); display: flex; gap: 7px; align-items: center; }
.ai-panel-body { padding: 14px; font-size: 13px; color: var(--muted); line-height: 1.6; }
.ai-summary { color: var(--text); margin-bottom: 14px; }
.ai-list-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 7px; }
.ai-list { list-style: none; display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.ai-list li { display: flex; gap: 7px; line-height: 1.5; color: var(--text); font-size: 13px; }
.ai-list li::before { content: '→'; color: var(--primary); flex-shrink: 0; }

/* Feedback collection */
.feedback-panel { border: 1px solid var(--border2); border-radius: var(--r); background: var(--surface2); padding: 14px; }
.feedback-top { display:flex; gap:10px; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; margin-bottom: 10px; }
.feedback-status { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.feedback-help { font-size:12px; color: var(--muted); line-height:1.6; max-width: 680px; }
.feedback-endpoint { margin-top:8px; font-family:var(--mono); font-size:11px; color:var(--muted); word-break:break-all; }
.feedback-snippet { margin-top: 12px; }
.feedback-snippet-title { font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.feedback-list { display:flex; flex-direction:column; gap:8px; margin-top: 12px; }
.feedback-item { border:1px solid var(--border); border-radius: var(--r); background: var(--bg); padding:10px 12px; }
.feedback-item-top { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:6px; }
.feedback-rating { font-size:10px; font-weight:600; padding:2px 7px; border-radius:999px; }
.feedback-rating.positive { background: var(--green-dim); color: var(--green); }
.feedback-rating.neutral { background: var(--amber-dim); color: var(--amber); }
.feedback-rating.negative { background: var(--red-dim); color: var(--red); }
.feedback-main { font-size:13px; color:var(--text); line-height:1.6; }
.feedback-sub { font-size:12px; color:var(--muted); line-height:1.6; margin-top:4px; }
.feedback-diff { margin-top: 12px; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px;
  border-radius: var(--r); font-size: 13px; font-family: var(--font); font-weight: 600;
  cursor: pointer; border: none; transition: all var(--t); white-space: nowrap; }
.btn-primary { background: var(--primary); color: #070A12; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-green { background: var(--green); color: #070A12; }
.btn-green:hover { filter: brightness(1.1); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
.btn-secondary:hover { background: var(--border2); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--border2); }
.btn:disabled { opacity: .4; cursor: not-allowed; filter: none !important; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 4px; }
.actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* Editor */
.editor { width: 100%; min-height: 380px; background: var(--bg); border: 1px solid var(--border2);
  border-radius: var(--r); color: var(--text); font-family: var(--mono); font-size: 12px;
  line-height: 1.7; padding: 12px; resize: vertical; outline: none; transition: border-color var(--t); }
.editor:focus { border-color: var(--primary); }

/* ── Evolution tab ── */
.evo-setup { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.evo-setup-col {}

.test-case-card { border: 1px solid var(--border2); border-radius: var(--r);
  overflow: hidden; margin-bottom: 10px; }
.tc-hdr { padding: 9px 12px; background: var(--surface2);
  display: flex; align-items: center; justify-content: space-between; }
.tc-name { font-size: 13px; font-weight: 600; color: var(--heading); }
.tc-body { padding: 10px 12px; }
.tc-prompt { font-size: 12px; font-family: var(--mono); color: var(--text);
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  padding: 6px 8px; margin-bottom: 8px; }
.tc-validators { display: flex; flex-direction: column; gap: 4px; }
.validator-row { display: flex; align-items: center; gap: 6px; font-size: 11px;
  font-family: var(--mono); color: var(--muted); }
.val-type { color: var(--indigo); }
.val-val { color: var(--text); }

.evo-config { background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 14px; }
.evo-config-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.evo-config-label { font-size: 13px; color: var(--text); flex: 1; }
.rounds-input { background: var(--bg); border: 1px solid var(--border2); border-radius: 4px;
  color: var(--text); font-family: var(--mono); padding: 5px 8px; width: 60px;
  font-size: 13px; outline: none; }
.rounds-input:focus { border-color: var(--primary); }

/* Evolution console */
.evo-console { background: var(--bg); border: 1px solid var(--border2); border-radius: var(--r);
  min-height: 280px; max-height: 400px; overflow-y: auto; padding: 12px; font-family: var(--mono);
  font-size: 12px; line-height: 1.8; }
.log-line { margin-bottom: 2px; }
.log-start { color: var(--primary); }
.log-phase { color: var(--indigo); }
.log-testing { color: var(--muted); }
.log-test-result { color: var(--text); }
.log-proposal { color: var(--amber); }
.log-keep { color: var(--green); font-weight: 500; }
.log-revert { color: var(--red); }
.log-done { color: var(--green); font-weight: 500; }
.log-converged { color: var(--amber); }
.log-error { color: var(--red); }

/* Score bar */
.score-bar-wrap { margin: 14px 0; }
.score-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 5px; font-family: var(--mono); }
.score-bar-track { height: 6px; background: var(--border2); border-radius: 3px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width .5s ease; }

/* History table */
.history-table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: var(--mono); }
.history-table th { text-align: left; padding: 7px 10px; font-size: 10px; letter-spacing: .08em;
  text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
.history-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
.history-table tr:last-child td { border-bottom: none; }
.decision-keep { color: var(--green); }
.decision-revert { color: var(--red); }

/* Test run results */
.test-run-result { border: 1px solid var(--border2); border-radius: var(--r); overflow: hidden; margin-bottom: 8px; }
.trr-hdr { padding: 8px 12px; background: var(--surface2); display: flex; align-items: center; gap: 8px; }
.trr-name { font-size: 13px; font-weight: 600; flex: 1; }
.trr-score { font-family: var(--mono); font-size: 12px; }
.trr-body { padding: 8px 12px; display: flex; flex-direction: column; gap: 3px; }
.trr-detail { font-size: 11px; font-family: var(--mono); display: flex; gap: 6px; color: var(--muted); }
.trr-pass { color: var(--green); }
.trr-fail { color: var(--red); }

/* Spinner */
.spinner { width: 14px; height: 14px; border: 2px solid transparent;
  border-top-color: currentColor; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Notification drawer ── */
.notif-btn {
  position: fixed; bottom: 20px; right: 20px; z-index: 100;
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all var(--t); box-shadow: 0 4px 16px rgba(0,0,0,.4);
}
.notif-btn:hover { border-color: var(--primary); }
.notif-badge {
  position: absolute; top: -4px; right: -4px; min-width: 18px; height: 18px;
  background: var(--red); border-radius: 9px; font-size: 10px; font-weight: 700;
  color: #fff; display: flex; align-items: center; justify-content: center;
  padding: 0 4px;
}
.notif-drawer {
  position: fixed; bottom: 72px; right: 20px; width: 360px; z-index: 100;
  background: var(--surface); border: 1px solid var(--border2); border-radius: var(--r);
  box-shadow: 0 8px 32px rgba(0,0,0,.5); overflow: hidden;
  transform: translateY(10px) scale(.97); opacity: 0;
  transition: all var(--t); pointer-events: none;
}
.notif-drawer.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }
.notif-drawer-hdr {
  padding: 10px 14px; background: var(--surface2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.notif-drawer-title { font-size: 12px; font-weight: 600; color: var(--heading);
  display: flex; align-items: center; gap: 8px; }
.notif-clear { font-size: 11px; color: var(--muted); cursor: pointer; }
.notif-clear:hover { color: var(--text); }
.notif-list { max-height: 380px; overflow-y: auto; }
.notif-empty { padding: 20px; text-align: center; color: var(--muted); font-size: 13px; }
.notif-item {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background var(--t);
}
.notif-item:hover { background: var(--surface2); }
.notif-item:last-child { border-bottom: none; }
.notif-item-top { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
.notif-icon { font-size: 13px; flex-shrink: 0; }
.notif-msg { font-size: 12px; color: var(--text); flex: 1; line-height: 1.4; }
.notif-time { font-size: 10px; color: var(--muted); font-family: var(--mono); white-space: nowrap; }
.notif-chips { display: flex; gap: 5px; flex-wrap: wrap; }
.chip {
  font-size: 11px; font-family: var(--mono); padding: 2px 7px;
  border-radius: 4px; font-weight: 600;
}
.chip-ok  { background: var(--green-dim); color: var(--green); }
.chip-warn{ background: var(--amber-dim); color: var(--amber); }
.chip-bad { background: var(--red-dim);   color: var(--red);   }
.chip-info{ background: var(--primary-dim); color: var(--primary); }

/* watcher status */
.watcher-dot { width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted); display: inline-block; transition: background .4s; }
.watcher-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }

/* ── Modal ── */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  background: rgba(7,10,18,.72); padding: 20px;
}
.modal-backdrop[hidden] { display: none; }
.modal {
  width: min(460px, 100%); background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r); box-shadow: 0 18px 60px rgba(0,0,0,.55); overflow: hidden;
}
.modal-hdr { padding: 14px 16px; background: var(--surface2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; }
.modal-kind { width: 9px; height: 9px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
.modal-kind.warn { background: var(--amber); }
.modal-kind.error { background: var(--red); }
.modal-kind.success { background: var(--green); }
.modal-title { font-size: 14px; font-weight: 700; color: var(--heading); }
.modal-body { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.modal-message { font-size: 13px; line-height: 1.7; color: var(--text); }
.modal-detail { font-size: 12px; line-height: 1.6; color: var(--muted); background: var(--bg);
  border: 1px solid var(--border); border-radius: 4px; padding: 10px; }
.modal-actions { padding: 12px 16px; border-top: 1px solid var(--border); display: flex;
  justify-content: flex-end; gap: 8px; background: var(--surface2); }
</style>
</head>
<body>
<div class="layout">
  <header class="topbar">
    <div class="logo">SKILLS <span>MGR</span></div>
    <div class="path-badge" id="skills-path">loading...</div>
    <div class="spacer"></div>
    <div class="top-stat">共 <b id="total-count">–</b> 个 skills</div>
    <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)">
      <span class="watcher-dot" id="watcher-dot"></span>
      <span id="watcher-label">监听中...</span>
    </div>
  </header>
  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-hdr">
        <span>Skills</span>
        <span id="sidebar-count" style="color:var(--primary)">–</span>
      </div>
      <input class="search" type="text" placeholder="搜索..." id="search-input" oninput="filterSkills()">
      <div id="skill-list"></div>
    </aside>
    <main class="detail" id="detail">
      <div class="empty-state">
        <div class="empty-icon">⬡</div>
        <div>从左侧选择一个 skill</div>
      </div>
    </main>
  </div>
</div>

<div class="modal-backdrop" id="modal-backdrop" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-hdr">
      <div class="modal-kind" id="modal-kind"></div>
      <div class="modal-title" id="modal-title"></div>
    </div>
    <div class="modal-body">
      <div class="modal-message" id="modal-message"></div>
      <div class="modal-detail" id="modal-detail" hidden></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" id="modal-cancel">取消</button>
      <button class="btn btn-primary btn-sm" id="modal-confirm">确认</button>
    </div>
  </div>
</div>

<script>
let allSkills = [], currentId = null, currentData = null, currentDiffOptions = {};
let modalResolve = null, modalPreviousFocus = null;

// ── API ─────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const r = await fetch('/api' + path, { headers: {'Content-Type':'application/json'}, ...opts });
  return r.json();
}

// ── Modal ───────────────────────────────────────────────────
function closeModal(result) {
  const backdrop = document.getElementById('modal-backdrop');
  if (backdrop) backdrop.hidden = true;
  if (modalPreviousFocus && typeof modalPreviousFocus.focus === 'function') modalPreviousFocus.focus();
  const resolve = modalResolve;
  modalResolve = null;
  modalPreviousFocus = null;
  if (resolve) resolve(result);
}

function openModal({ title, message, detail = '', kind = 'info', confirmText = '确认', cancelText = '取消', showCancel = false, confirmClass = 'btn-primary' }) {
  if (modalResolve) closeModal(false);
  modalPreviousFocus = document.activeElement;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-message').textContent = message;
  const detailEl = document.getElementById('modal-detail');
  detailEl.textContent = detail;
  detailEl.hidden = !detail;
  const kindEl = document.getElementById('modal-kind');
  kindEl.className = `modal-kind ${kind}`;
  const cancelBtn = document.getElementById('modal-cancel');
  cancelBtn.textContent = cancelText;
  cancelBtn.hidden = !showCancel;
  const confirmBtn = document.getElementById('modal-confirm');
  confirmBtn.textContent = confirmText;
  confirmBtn.className = `btn ${confirmClass} btn-sm`;
  document.getElementById('modal-backdrop').hidden = false;
  confirmBtn.focus();
  return new Promise(resolve => { modalResolve = resolve; });
}

function confirmAction(opts) {
  return openModal({ kind: 'warn', confirmText: '确认', cancelText: '取消', showCancel: true, ...opts });
}

function showMessage(opts) {
  return openModal({ kind: 'info', confirmText: '知道了', showCancel: false, ...opts });
}

document.getElementById('modal-confirm').addEventListener('click', () => closeModal(true));
document.getElementById('modal-cancel').addEventListener('click', () => closeModal(false));
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target.id === 'modal-backdrop') closeModal(false);
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.getElementById('modal-backdrop').hidden) closeModal(false);
});

// ── Init ────────────────────────────────────────────────────
async function init() {
  const cfg = await api('/config');
  const pathBadge = document.getElementById('skills-path');
  pathBadge.textContent = cfg.skills_path;
  pathBadge.title = `管理台元数据: ${cfg.meta_path || '未配置'}`;
  if (!cfg.exists) document.getElementById('skills-path').style.color = 'var(--red)';
  await loadSkills();
}

async function loadSkills() {
  const data = await api('/skills');
  allSkills = data.skills;
  document.getElementById('total-count').textContent = data.total;
  renderList(allSkills);
}

// ── Sidebar ──────────────────────────────────────────────────
function filterSkills() {
  const q = document.getElementById('search-input').value.toLowerCase();
  renderList(allSkills.filter(s => s.name.toLowerCase().includes(q) || (s.description||'').toLowerCase().includes(q)));
}

const typeLabel = t => ({verifiable:'可验证',anchor:'锚点型',judgment:'判断型',unknown:'未分类'}[t]||t);
const scoreColor = s => s>=90?'var(--green)':s>=75?'var(--primary)':s>=60?'var(--amber)':'var(--red)';
const healthStatusLabel = s => ({blocking:'阻断项',risk:'风险项',healthy:'结构健康'}[s] || '结构健康');

function renderList(skills) {
  document.getElementById('sidebar-count').textContent = skills.length;
  const sorted = [...skills].sort((a,b) => a.health_score - b.health_score);
  document.getElementById('skill-list').innerHTML = sorted.map(s => `
    <div class="skill-item ${s.id===currentId?'active':''}" onclick="selectSkill('${s.id}')" data-id="${s.id}">
      <div class="si-top">
        <span class="si-name" title="${s.name}">${s.name}</span>
        <span class="badge badge-grade-${s.health_grade}">${s.health_grade} ${s.health_score}</span>
      </div>
      <div class="si-bot">
        <span class="badge badge-${s.type}">${typeLabel(s.type)}</span>
        ${s.has_tests ? '<span class="test-dot" title="有测试用例"></span>' : ''}
        ${(s.blocking_count||0)>0 ? `<span style="font-size:11px;color:var(--red)">阻断 ${s.blocking_count}</span>` :
          (s.risk_count||0)>0 ? `<span style="font-size:11px;color:var(--amber)">风险 ${s.risk_count}</span>` :
          (s.optimization_count||0)>0 ? `<span style="font-size:11px;color:var(--primary)">优化 ${s.optimization_count}</span>` : ''}
        <span class="si-date">${s.modified||''}</span>
      </div>
    </div>`).join('');
}

// ── Detail ───────────────────────────────────────────────────
async function selectSkill(id) {
  currentId = id;
  document.querySelectorAll('.skill-item').forEach(el => el.classList.toggle('active', el.dataset.id===id));
  document.getElementById('detail').innerHTML = `<div class="empty-state"><span class="spinner" style="width:22px;height:22px;border-color:var(--border2);border-top-color:var(--primary)"></span></div>`;
  const data = await api(`/skills/${id}`);
  currentData = data;
  renderDetail(data);
}

function renderDetail(data) {
  const h = data.health, r = 29, circ = 2*Math.PI*r;
  const offset = circ - (h.score/100)*circ;
  const col = scoreColor(h.score);
  const groups = h.groups || {blocking:[], risk:[], optimization:[]};
  const counts = h.counts || {blocking:0, risk:0, optimization:0};
  const baseline = data.baseline || { exists:false };
  const summary = data.overview_summary || { summary:'', usage:[], recommended_scenarios:[], cautions:[] };
  const overviewText = counts.blocking > 0
    ? '这些是会直接影响 skill 可用性或按文档执行会失败的问题，建议优先修。'
    : counts.risk > 0
      ? '这些问题通常不阻断当前使用，但会影响触发稳定性、维护成本或自动进化质量。'
      : counts.optimization > 0
        ? '当前可以正常使用，下面主要是便于后续维护和复用的优化建议。'
        : '当前没有发现明显结构问题，可以直接使用。';
  const renderIssueGroup = (title, kind, items) => items.length === 0 ? '' : `
    <div class="section" style="margin-top:12px">
      <div class="section-title">${title}</div>
      <div class="issues">${items.map(i=>`
        <div class="issue ${kind}">
          <div class="issue-dot"></div>
          <div>
            <div class="issue-msg">${i.message}</div>
            <div class="issue-dim">${i.dimension} · ${i.impact}</div>
          </div>
        </div>`).join('')}</div>
    </div>`;

  document.getElementById('detail').innerHTML = `
    <div class="tabs-bar">
      <div class="tab active" onclick="switchTab('overview',this)">总览</div>
      <div class="tab" onclick="switchTab('evolution',this)">版本与测试</div>
    </div>

    <div class="tab-content active" id="tab-overview">
      <div class="detail-header">
        <div class="detail-title-block">
          <div class="detail-name">${data.name}</div>
          <div class="detail-badges">
            <span class="badge badge-grade-${h.grade}">健康度 ${h.grade}</span>
            <span class="badge badge-${data.type}">${typeLabel(data.type)}</span>
            ${data.write_protection?.requires_confirm_write ? '<span class="badge badge-unknown" title="恢复和自动进化写回需要显式确认">写保护</span>' : ''}
          </div>
          <div class="detail-desc">${data.description||'<span style="color:var(--muted)">无描述</span>'}</div>
        </div>
        <div class="ring">
          <svg viewBox="0 0 70 70">
            <circle class="ring-bg" cx="35" cy="35" r="${r}"/>
            <circle class="ring-fill" cx="35" cy="35" r="${r}"
              stroke="${col}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
          </svg>
          <div class="ring-text">
            <span class="ring-num" style="color:${col}">${h.score}</span>
            <span class="ring-lbl">分</span>
          </div>
        </div>
      </div>

      <div class="baseline-strip">
        <div class="baseline-card">
          <div class="baseline-label">当前基线时间</div>
          <div class="baseline-value">${baseline.exists ? (baseline.set_at || '–').slice(0, 19).replace('T',' ') : '未设置'}</div>
        </div>
        <div class="baseline-card">
          <div class="baseline-label">当前基线分数</div>
          <div class="baseline-value">${baseline.score != null ? `${(baseline.score * 100).toFixed(1)}%` : '未设置'}</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">结构检查</div>
        <div class="health-summary">
          <span class="health-chip blocking">阻断 ${counts.blocking}</span>
          <span class="health-chip risk">风险 ${counts.risk}</span>
          <span class="health-chip optimization">优化 ${counts.optimization}</span>
        </div>
        <div class="health-explain">${overviewText}</div>
        ${counts.blocking===0 && counts.risk===0 && counts.optimization===0
          ? '<div class="no-issues">✓ 无结构问题</div>'
          : `
            ${renderIssueGroup('阻断项', 'blocking', groups.blocking || [])}
            ${renderIssueGroup('风险项', 'risk', groups.risk || [])}
            ${renderIssueGroup('优化项', 'optimization', groups.optimization || [])}
          `}
      </div>

      <div class="section">
        <div class="section-title">摘要</div>
        <div class="actions" style="margin-bottom:10px">
          <button class="btn btn-ghost btn-sm" onclick="regenerateSummary()" id="summary-btn">重新生成摘要</button>
        </div>
        <div class="detail-desc" style="margin-bottom:12px">${summary.summary || '<span style="color:var(--muted)">暂无摘要</span>'}</div>
        <div class="summary-grid">
          <div class="summary-card">
            <div class="summary-card-title">如何使用</div>
            <div class="summary-card-body">${renderSummaryList(summary.usage)}</div>
          </div>
          <div class="summary-card">
            <div class="summary-card-title">推荐使用场景</div>
            <div class="summary-card-body">${renderSummaryList(summary.recommended_scenarios)}</div>
          </div>
          <div class="summary-card">
            <div class="summary-card-title">注意事项</div>
            <div class="summary-card-body">${renderSummaryList(summary.cautions)}</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">反馈采集</div>
        <div id="feedback-area">
          <div style="color:var(--muted);font-size:13px">加载中...</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">进化类型</div>
        <div class="type-grid">
          ${['verifiable','anchor','judgment'].map(t=>`
            <div class="type-card ${data.type===t?'sel-'+t:''}" onclick="setType('${t}')">
              <div class="type-icon">${{verifiable:'⚙',anchor:'⚓',judgment:'👁'}[t]}</div>
              <div class="type-name">${{verifiable:'可验证型',anchor:'锚点型',judgment:'判断型'}[t]}</div>
              <div class="type-desc">${{
                verifiable:'输出可客观验证，支持自动进化',
                anchor:'需人工审批样本作锚点',
                judgment:'纯主观判断，只做维护'
              }[t]}</div>
            </div>`).join('')}
        </div>
      </div>

      <div class="section">
        <div class="section-title">AI 分析</div>
        <div class="ai-panel">
          <div class="ai-panel-hdr">
            <span class="ai-panel-title">✦ 智能诊断</span>
            <button class="btn btn-primary btn-sm" onclick="runAiAnalysis()" id="ai-btn">运行分析</button>
          </div>
          <div class="ai-panel-body" id="ai-body">点击“运行分析”对该 skill 进行诊断。</div>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-evolution">
      <div class="section">
        <div class="section-title">测试用例</div>
        <div id="test-cases-area">
          <div style="color:var(--muted);font-size:13px">加载中...</div>
        </div>
        <div class="actions" style="margin-top:10px">
          <button class="btn btn-secondary btn-sm" onclick="generateTests()" id="gen-tests-btn">✦ AI 自动生成测试用例</button>
          <button class="btn btn-ghost btn-sm" onclick="runTestsOnly()" id="run-tests-btn">▷ 运行测试</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">基线操作</div>
        <div class="evo-config">
          <div class="actions">
            <button class="btn btn-secondary btn-sm" onclick="setBaseline()" id="baseline-btn">⚑ 保存为基线</button>
            <button class="btn btn-ghost btn-sm" onclick="restoreBaseline()" id="restore-baseline-btn" ${baseline.exists ? '' : 'disabled'}>↺ 恢复到基线</button>
            <button class="btn btn-ghost btn-sm" onclick="loadDiff()" id="diff-btn" ${baseline.exists ? '' : 'disabled'}>查看 Diff</button>
            <button class="btn btn-ghost btn-sm" onclick="loadHistory()" id="history-btn">查看历史</button>
          </div>
        </div>
      </div>

      <div class="section" id="diff-section" style="display:none">
        <div class="section-title">当前版本与基线 Diff</div>
        <div id="diff-content"></div>
      </div>

      <div class="section" id="history-section" style="display:none">
        <div class="section-title">版本历史</div>
        <div id="history-content"></div>
      </div>
    </div>
  `;

  loadTestCases();
  loadFeedbackPanel();
}

function switchTab(tabId, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + tabId).classList.add('active');
  if (tabId === 'evolution') loadTestCases();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderSummaryList(items) {
  if (!items || items.length === 0) return '<span style="color:var(--muted)">暂无</span>';
  return `<ul>${items.map(item => `<li>${escHtml(item)}</li>`).join('')}</ul>`;
}

function skillPrefKey(id) {
  return `skills-mgr:${id}:prefs`;
}

function loadSkillPrefs(id) {
  try { return JSON.parse(localStorage.getItem(skillPrefKey(id)) || '{}'); }
  catch { return {}; }
}

function saveSkillPrefs(id, patch) {
  const next = { ...loadSkillPrefs(id), ...patch };
  localStorage.setItem(skillPrefKey(id), JSON.stringify(next));
  return next;
}

// ── Feedback collection ──────────────────────────────────────
const feedbackRatingLabel = r => ({positive:'成功', neutral:'勉强', negative:'失败'}[r] || r || '未知');

async function loadFeedbackPanel() {
  const area = document.getElementById('feedback-area');
  if (!area || !currentId) return;
  try {
    const config = await api(`/skills/${currentId}/feedback/config`);
    const data = await api(`/skills/${currentId}/feedback?limit=20`);
    if (config.error) throw new Error(config.error);
    if (data.error) throw new Error(data.error);
    currentData.feedback_config = config;
    currentData.feedback_items = data.feedback || [];
    renderFeedbackPanel(config, data.feedback || []);
  } catch (e) {
    area.innerHTML = `<div style="color:var(--red);font-size:13px">反馈采集加载失败: ${escHtml(e.message)}</div>`;
  }
}

function renderFeedbackPanel(config, feedbackItems) {
  const area = document.getElementById('feedback-area');
  if (!area) return;
  const enabled = !!config.enabled;
  const installed = !!config.installed;
  const statusText = enabled ? (installed ? '已安装' : '已启用，待安装') : '未启用';
  const statusClass = enabled ? (installed ? 'positive' : 'neutral') : 'negative';
  const latest = feedbackItems || [];
  area.innerHTML = `
    <div class="feedback-panel">
      <div class="feedback-top">
        <div>
          <div class="feedback-status">
            <span class="feedback-rating ${statusClass}">${statusText}</span>
            ${enabled && config.install_id ? `<span class="version-meta">${escHtml(config.install_id)}</span>` : ''}
          </div>
          <div class="feedback-help">
            ${enabled
              ? 'agent 会在任务完成或阻塞后按 SKILL.md 内的片段提交结构化反馈；本地 endpoint 不可用时写入 fallback JSONL。'
              : '启用后会生成一段可安装到 SKILL.md 的反馈采集片段，agent 可在任务收尾时自动回传运行反馈。'}
          </div>
          ${enabled ? `<div class="feedback-endpoint">${escHtml(config.endpoint_url || '')}</div>` : ''}
          ${enabled && config.fallback_file ? `<div class="feedback-endpoint">Fallback: ${escHtml(config.fallback_file)}</div>` : ''}
        </div>
        <div class="actions">
          ${enabled
            ? `<button class="btn btn-secondary btn-sm" onclick="showFeedbackDiff()">${installed ? '查看更新 Diff' : '查看安装 Diff'}</button>`

        </div>

      ` : ''}
      <div class="feedback-list">
        ${latest.length ? latest.map(item => `
          <div class="feedback-item">
            <div class="feedback-item-top">
              <span class="feedback-rating ${item.rating}">${feedbackRatingLabel(item.rating)}</span>
              <span class="version-meta">${escHtml((item.created_at || '').slice(0,19).replace('T',' '))}</span>

          </div>
        `).join('') : '<div class="feedback-help">暂无自动回传反馈。</div>'}

function historySourceClass(source) {
  return source === 'baseline' ? 'baseline' :
    source === 'pre-restore' || source === 'pre-apply-candidate' ? 'pre-restore' :
    source === 'evolution-candidate' ? 'baseline' : 'other';
}

function historySourceLabel(source) {
  return ({baseline:'基线', 'pre-restore':'pre-restore', 'pre-apply-candidate':'应用前快照', 'evolution-candidate':'候选'}[source] || '其他');
}

function getFilteredVersions(versions, filter) {
  if (filter === 'baseline') return versions.filter(v => v.source === 'baseline');
  if (filter === 'pre-restore') return versions.filter(v => v.source === 'pre-restore');
  if (filter === 'candidate') return versions.filter(v => v.source === 'evolution-candidate');
  if (filter === 'other') return versions.filter(v => !['baseline','pre-restore','pre-apply-candidate','evolution-candidate'].includes(v.source));
  return versions;
}

function renderHistoryContent(versions, page, pageSize, filter) {
  const content = document.getElementById('history-content');
  if (!content) return;
  const filtered = getFilteredVersions(versions, filter);
  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  const safePage = Math.min(page, totalPages);
  const items = filtered.slice((safePage - 1) * pageSize, safePage * pageSize);
  saveSkillPrefs(currentId, { historyPage: safePage, historyPageSize: pageSize, historyFilter: filter });

  content.innerHTML = `
    <div class="history-toolbar">
      <select class="select" id="history-filter" onchange="onHistoryFilterChange()">
        ${['all','candidate','baseline','pre-restore','other'].map(v => `<option value="${v}" ${filter===v?'selected':''}>${({all:'全部', candidate:'候选', baseline:'基线', 'pre-restore':'pre-restore', other:'其他'}[v])}</option>`).join('')}
      </select>
      <select class="select" id="history-size" onchange="onHistorySizeChange()">
        ${[10,20,50,100].map(v => `<option value="${v}" ${pageSize===v?'selected':''}>每页 ${v}</option>`).join('')}
      </select>
    </div>
    <div class="version-list">
      ${items.map(v => `
        <div class="version-item">
          <div class="version-top">
            <span class="version-source ${historySourceClass(v.source)}">${historySourceLabel(v.source)}</span>
            ${v.is_baseline ? '<span class="health-chip optimization">当前基线</span>' : ''}
            <span class="version-id">${v.id}</span>
          </div>
          <div class="version-meta">${(v.created_at || '').slice(0,19).replace('T',' ')} · ${v.score != null ? `${(v.score * 100).toFixed(1)}%` : '无分数'}${v.note ? ` · ${v.note}` : ''}</div>
          <div class="version-actions">
            ${v.source === 'evolution-candidate'
              ? `<button class="btn btn-secondary btn-xs" onclick="showCandidateDiff('${v.id}')">查看候选 Diff</button>
                 <button class="btn btn-green btn-xs" onclick="applyCandidate('${v.id}')">应用候选</button>`
              : `<button class="btn btn-ghost btn-xs" onclick="restoreVersion('${v.id}')">恢复为当前版本</button>`}
          </div>
        </div>`).join('')}
    </div>
    <div class="pager">
      <button class="btn btn-ghost btn-xs" onclick="changeHistoryPage(-1)" ${safePage<=1?'disabled':''}>上一页</button>
      <span class="version-meta">第 ${safePage} / ${totalPages} 页</span>
      <button class="btn btn-ghost btn-xs" onclick="changeHistoryPage(1)" ${safePage>=totalPages?'disabled':''}>下一页</button>
    </div>
  `;
}

function onHistoryFilterChange() {
  renderHistoryContent(currentData.version_history || [], 1, Number(document.getElementById('history-size').value), document.getElementById('history-filter').value);
}

function onHistorySizeChange() {
  renderHistoryContent(currentData.version_history || [], 1, Number(document.getElementById('history-size').value), document.getElementById('history-filter').value);
}

function changeHistoryPage(delta) {
  const prefs = loadSkillPrefs(currentId);
  renderHistoryContent(currentData.version_history || [], (prefs.historyPage || 1) + delta, prefs.historyPageSize || 20, prefs.historyFilter || 'all');
}

    const data = await api(`/skills/${currentId}/baseline/diff`);
    if (data.error) throw new Error(data.error);
    const prefs = loadSkillPrefs(currentId);
    currentData.diff_data = data;
    renderDiffContent(data, prefs.diffExpandAll || false);
  } catch (e) {
    content.innerHTML = `<div style="color:var(--red);font-size:13px">Diff 加载失败: ${e.message}</div>`;
  }
}

function renderDiffContent(data, expandAll, options = {}) {
  const content = document.getElementById('diff-content');
  const blocks = data.blocks || [];
  currentDiffOptions = options;
  saveSkillPrefs(currentId, { diffExpandAll: expandAll });
  if (blocks.length === 0) {
    content.innerHTML = `<div class="diff-summary">${options.emptyText || '当前版本与基线没有差异。'}</div>`;
    return;
  }
  const title = options.title || `新增 ${data.summary.added} · 删除 ${data.summary.deleted} · 修改 ${data.summary.modified}`;
  const oldLabel = options.oldLabel || '基线版本';
  const newLabel = options.newLabel || '当前版本';
  const extraActions = options.extraActions || '';
  content.innerHTML = `
    <div class="diff-toolbar">
      <div class="diff-summary">${title}</div>
      <div class="actions">
        ${extraActions}
        <button class="btn btn-ghost btn-xs" onclick="renderDiffContent(currentData.diff_data, true, currentDiffOptions)">全部展开</button>
        <button class="btn btn-ghost btn-xs" onclick="renderDiffContent(currentData.diff_data, false, currentDiffOptions)">全部收起</button>
      </div>
    </div>
    <div class="diff-list">
      ${blocks.map((b, idx) => {
        const open = expandAll || b.type === 'modified';
        return `<div class="diff-block ${open ? 'open' : ''}" id="diff-${idx}">
          <div class="diff-header ${b.type}" onclick="toggleDiffBlock(${idx})">
            <div class="diff-header-left">
              <span class="diff-kind ${b.type}">${({added:'新增', deleted:'删除', modified:'修改'}[b.type])}</span>
              <span class="version-meta">影响 ${b.line_count} 行</span>
            </div>
            <span class="version-meta">旧 ${b.old_start}-${b.old_end || b.old_start} / 新 ${b.new_start}-${b.new_end || b.new_start}</span>
          </div>
          <div class="diff-body">
            <div class="diff-col-wrap">
              <div>
                <div class="diff-col-title">${oldLabel}</div>
                <div class="diff-pre">${escHtml((b.old_lines || []).join('\n') || '∅')}</div>
              </div>
              <div>
                <div class="diff-col-title">${newLabel}</div>
                <div class="diff-pre">${escHtml((b.new_lines || []).join('\n') || '∅')}</div>
              </div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function toggleDiffBlock(idx) {
  const el = document.getElementById(`diff-${idx}`);
  if (el) el.classList.toggle('open');
}

init();
</script>

<!-- ── Notification drawer ── -->
<div class="notif-btn" onclick="toggleDrawer()" id="notif-btn">
  🔔
  <div class="notif-badge" id="notif-badge" style="display:none">0</div>
</div>
<div class="notif-drawer" id="notif-drawer">
  <div class="notif-drawer-hdr">
    <div class="notif-drawer-title">
      <span>活动通知</span>
      <span class="watcher-dot live" style="width:6px;height:6px"></span>
    </div>
    <span class="notif-clear" onclick="clearNotifs()">清空</span>
  </div>
  <div class="notif-list" id="notif-list">
    <div class="notif-empty">暂无通知，监听 skill 文件变化中...</div>
  </div>
</div>

<script>
// ── Notification system ───────────────────────────────────────
let notifications = [];
let unreadCount = 0;
let drawerOpen = false;
let notifSource = null;

function connectNotifications() {
  if (notifSource) notifSource.close();
  notifSource = new EventSource('/api/notifications');

  notifSource.onopen = () => {
    document.getElementById('watcher-dot').classList.add('live');
    document.getElementById('watcher-label').textContent = '文件监听中';
  };

  notifSource.onerror = () => {
    document.getElementById('watcher-dot').classList.remove('live');
    document.getElementById('watcher-label').textContent = '监听断开';
    setTimeout(connectNotifications, 3000);
  };

  notifSource.onmessage = e => {
    const data = JSON.parse(e.data);
    if (data.type === 'connected') return;
    handleNotification(data);
  };
}

function handleNotification(data) {
  const ts = new Date().toLocaleTimeString('zh', {hour12: false});

  const notif = { ...data, ts, id: Date.now() };
  notifications.unshift(notif);
  if (notifications.length > 50) notifications.pop();

  if (!drawerOpen) {
    unreadCount++;
    updateBadge();
  }

  renderNotifList();

  // If the affected skill is currently open, refresh its detail
  if (data.skill_id && data.skill_id === currentId) {
    if (data.type === 'auto_evolve_end' || data.type === 'test_done') {
      selectSkill(currentId);
    }
    // Stream evo events into the console if evolution tab is visible
    if (data.source === 'auto_evolve') {
      const consoleEl = document.getElementById('evo-console');
      const consoleSection = document.getElementById('evo-console-section');
      if (consoleEl) {
        if (consoleSection) consoleSection.style.display = 'block';
        appendLog(consoleEl, data);
        if (data.type === 'done') updateScoreBar(data.final_score);
      }
    }
  }

  // Also refresh sidebar scores after evolution ends
  if (data.type === 'auto_evolve_end') {
    loadSkills().then(() => {
      document.querySelectorAll('.skill-item').forEach(el =>
        el.classList.toggle('active', el.dataset.id === currentId));
    });
  }
}

function notifIcon(type, severity) {
  if (type === 'file_changed') return '📝';
  if (type === 'auto_evolve_start') return '⚡';
  if (type === 'auto_evolve_end') return '✅';
  if (type === 'test_error') return '❌';
  if (type === 'feedback_received') return '◆';
  if (type === 'round_done') return severity === 'keep' ? '✓' : '✗';
  if (severity === 'ok') return '✓';
  if (severity === 'warn') return '⚠';
  if (severity === 'bad') return '✗';
  return '◈';
}

function notifChipClass(severity, delta) {
  if (severity === 'ok' || delta > 0) return 'chip-ok';
  if (severity === 'warn') return 'chip-warn';
  if (severity === 'bad' || (delta !== null && delta < -0.1)) return 'chip-bad';
  return 'chip-info';
}

function renderNotifList() {
  const el = document.getElementById('notif-list');
  if (notifications.length === 0) {
    el.innerHTML = '<div class="notif-empty">暂无通知</div>';
    return;
  }
  el.innerHTML = notifications.map(n => {
    const chips = [];
    if (n.score !== undefined) {
      const cls = n.delta > 0 ? 'chip-ok' : n.delta < -0.1 ? 'chip-bad' : n.delta < 0 ? 'chip-warn' : 'chip-info';
      chips.push(`<span class="chip ${cls}">${(n.score*100).toFixed(1)}%</span>`);
    }
    if (n.delta !== null && n.delta !== undefined) {
      const cls = n.delta > 0 ? 'chip-ok' : n.delta < 0 ? 'chip-bad' : 'chip-info';
      const sign = n.delta > 0 ? '+' : '';
      chips.push(`<span class="chip ${cls}">${sign}${(n.delta*100).toFixed(1)}%</span>`);
    }
    return `
      <div class="notif-item" onclick="onNotifClick('${n.skill_id||''}')">
        <div class="notif-item-top">
          <span class="notif-icon">${notifIcon(n.type, n.severity)}</span>
          <span class="notif-msg">${n.message||n.type}</span>
          <span class="notif-time">${n.ts}</span>
        </div>
        ${chips.length ? `<div class="notif-chips">${chips.join('')}</div>` : ''}
      </div>`;
  }).join('');
}

function onNotifClick(skillId) {
  if (skillId && skillId !== currentId) selectSkill(skillId);
  if (drawerOpen) toggleDrawer();
}

function toggleDrawer() {
  drawerOpen = !drawerOpen;
  document.getElementById('notif-drawer').classList.toggle('open', drawerOpen);
  if (drawerOpen) {
    unreadCount = 0;
    updateBadge();
  }
}

function clearNotifs() {
  notifications = [];
  unreadCount = 0;
  updateBadge();
  renderNotifList();
}

function updateBadge() {
  const badge = document.getElementById('notif-badge');
  if (unreadCount > 0) {
    badge.style.display = 'flex';
    badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
  } else {
    badge.style.display = 'none';
  }
}

connectNotifications();
</script>
</body>
</html>
